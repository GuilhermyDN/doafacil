<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- EARS -->
  <ellipse cx="100" cy="105" rx="52" ry="48" fill="white" stroke="#111" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="300" cy="108" rx="48" ry="44" fill="white" stroke="#111" stroke-width="6"/>

  <!-- INNER EARS -->
  <ellipse cx="100" cy="108" rx="30" ry="27" fill="#f0e8e8" stroke="#333" stroke-width="3"/>
  <ellipse cx="300" cy="110" rx="28" ry="25" fill="#f0e8e8" stroke="#333" stroke-width="3"/>

  <!-- MAIN HEAD -->
  <ellipse cx="200" cy="228" rx="155" ry="148" fill="white" stroke="#111" stroke-width="7" stroke-linejoin="round"/>

  <!-- DRIPS on head outline -->
  <path d="M80 320 Q78 340 76 358 Q77 362 80 358 Q83 362 84 340 Z" fill="#111"/>
  <path d="M130 368 Q129 388 128 402 Q130 406 132 402 Q134 388 134 370 Z" fill="#111"/>
  <path d="M200 375 Q199 395 198 410 Q200 415 202 410 Q203 396 202 376 Z" fill="#111"/>
  <path d="M270 368 Q269 385 268 398 Q270 402 272 398 Q273 386 273 370 Z" fill="#111"/>
  <path d="M320 330 Q318 348 316 362 Q318 366 320 362 Q322 348 322 332 Z" fill="#111"/>

  <!-- Drip from left ear -->
  <path d="M88 145 Q86 162 84 175 Q86 178 88 175 Q90 163 91 147 Z" fill="#111"/>

  <!-- EYE LEFT (hollow circle with drip - matching the reference) -->
  <circle cx="148" cy="195" r="38" fill="#111" stroke="#111" stroke-width="3"/>
  <circle cx="148" cy="192" r="22" fill="white"/>
  <circle cx="155" cy="186" r="8" fill="#111"/>
  <!-- drip from left eye -->
  <path d="M138 233 Q136 252 134 268 Q136 272 139 268 Q141 252 142 235 Z" fill="#111"/>
  <path d="M155 232 Q154 248 153 260 Q155 264 157 260 Q158 248 158 234 Z" fill="#111"/>

  <!-- EYE RIGHT (smaller dark eye with drip) -->
  <circle cx="258" cy="198" r="28" fill="#111" stroke="#111" stroke-width="3"/>
  <circle cx="263" cy="193" r="10" fill="#333" opacity="0.4"/>
  <!-- drip from right eye -->
  <path d="M250 226 Q248 244 247 258 Q249 262 252 258 Q253 244 254 228 Z" fill="#111"/>

  <!-- SNOUT -->
  <ellipse cx="200" cy="295" rx="62" ry="48" fill="#f5f0ea" stroke="#111" stroke-width="5"/>
  <!-- Nose -->
  <path d="M190 275 Q200 268 210 275 Q210 285 200 288 Q190 285 190 275 Z" fill="#111"/>
  <!-- Mouth lines -->
  <path d="M200 288 L200 302" stroke="#111" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M200 302 Q188 312 180 308" stroke="#111" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M200 302 Q212 312 220 308" stroke="#111" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- snout drip -->
  <path d="M185 340 Q183 355 182 366 Q184 369 186 366 Q188 355 188 342 Z" fill="#111"/>
  <path d="M210 342 Q209 357 208 368 Q210 371 212 368 Q213 357 213 344 Z" fill="#111"/>

  <!-- BLUE SCRIBBLE (nose area / left cheek mark) -->
  <circle cx="163" cy="258" r="16" fill="none" stroke="#2255ee" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="8 3"/>
  <circle cx="163" cy="258" r="10" fill="none" stroke="#2255ee" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 4"/>

  <!-- ORANGE X MARK (right cheek) -->
  <line x1="228" y1="248" x2="254" y2="274" stroke="#e85520" stroke-width="5" stroke-linecap="round"/>
  <line x1="254" y1="248" x2="228" y2="274" stroke="#e85520" stroke-width="5" stroke-linecap="round"/>
  <!-- drip from X -->
  <path d="M234 274 Q232 288 231 298 Q233 301 235 298 Q236 288 237 276 Z" fill="#e85520"/>
</svg>
